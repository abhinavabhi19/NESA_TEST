{% extends "admin/adminbase.html" %}

{% block content %}



<div class="max-w-lg bg-white shadow rounded-lg p-8 mx-auto">
    <h1 class="text-2xl font-semibold text-gray-700 mb-6 ">
        Assign Task
    </h1>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-4">

            <label class="block text-gray-600 mb-2">Task Title</label>

            <input type="text" name="title" required
                class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-400">

        </div>

        <div class="mb-4">

            <label class="block text-gray-600 mb-2">Description</label>

            <textarea name="description" rows="4" required
                class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-400"></textarea>

        </div>

        <div class="mb-4">

            <label class="block text-gray-600 mb-2">Assign User</label>

            <select name="user" required class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-400">

                {% for user in users %}

                <option value="{{ user.id }}">
                    {{ user.username }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-6">

            <label class="block text-gray-600 mb-2">Due Date</label>

            <input type="date" name="due_date" required
                class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-400">

        </div>

        <button class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700 transition">

            Assign Task

        </button>

    </form>

</div>

{% endblock %}
