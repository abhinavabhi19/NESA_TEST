<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white shadow-xl rounded-lg p-8 w-full max-w-md">

        <h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
            Login
        </h2>

        <form method="POST">

            {% csrf_token %}

            {% if form.errors %}
            <div class="mb-4 bg-red-50 border border-red-200 text-red-700 p-3 rounded">
                <ul class="list-disc list-inside">
                    {% for field in form %}
                        {% for error in field.errors %}
                            <li>{{ error }}</li>
                        {% endfor %}
                    {% endfor %}
                    {% for error in form.non_field_errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
            {% endif %}

            <div class="mb-4">

                <label class="block text-gray-600 mb-2">Username</label>

                <input type="text" name="username" value="{{ form.username.value|default_if_none:'' }}"
                    class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-400">

            </div>

            <div class="mb-6">

                <label class="block text-gray-600 mb-2">Password</label>

                <input type="password" name="password"
                    class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-indigo-400">

            </div>

            <button class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 transition">

                <i class="fa-solid fa-right-to-bracket mr-2"></i>
                Login

            </button>

        </form>

    </div>

</body>

</html>
