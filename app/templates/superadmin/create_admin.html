{% extends "superadmin/superadminbase.html" %}

{% block content %}

<div class="max-w-lg mx-auto bg-white shadow-lg rounded-lg p-8">

    <h2 class="text-xl font-semibold mb-6 text-gray-700">
        Create Admin
    </h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-4">
            <label class="block text-gray-600 mb-2">Username</label>
            <input type="text" name="username"
                class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>

        <div class="mb-4">
            <label class="block text-gray-600 mb-2">Password</label>
            <input type="password" name="password"
                class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>

        <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded w-full">
            Create Admin
        </button>

    </form>

</div>

{% endblock %}
