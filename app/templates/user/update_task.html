{% extends "user/userbase.html" %}

{% block content %}

<h1 class="text-xl font-semibold mb-6">
    Update Task
</h1>

<div class="max-w-lg bg-white shadow p-6 rounded">

    <form method="POST">

        {% csrf_token %}

        <div class="mb-4">

            <label>Status</label>

            <select name="status" class="w-full border p-2 rounded">

                <option value="PENDING">Pending</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="COMPLETED">Completed</option>

            </select>

        </div>

        <div class="mb-4">

            <label>Completion Report</label>

            <textarea name="completion_report" class="w-full border p-2 rounded"></textarea>

        </div>

        <div class="mb-4">

            <label>Worked Hours</label>

            <input type="number" step="0.1" name="worked_hours" class="w-full border p-2 rounded">

        </div>

        <button class="bg-green-600 text-white px-4 py-2 rounded">

            Update Task

        </button>

    </form>

</div>

{% endblock %}
